apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-result-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: student-result-app
  template:
    metadata:
      labels:
        app: student-result-app
    spec:
      containers:
        - name: student-result-app
          image: kevinabraham28/student-result-app:latest